name: Create Release with ZIP

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get version tag from commit
        id: version
        run: |
          VERSION=$(git log -1 --pretty=%B | grep -Eo 'v[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)
          if [ -z "$VERSION" ]; then
            echo "No version pattern found. Skipping."
            exit 0
          fi
          VERSION_PLAIN=$(echo $VERSION | sed 's/^v//')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_PLAIN=$VERSION_PLAIN" >> $GITHUB_ENV

      - name: Create ZIP file with git archive
        if: env.VERSION != ''
        run: |
          # This now pulls from our temp branch where the version is updated
          # and respects your .gitattributes export-ignore rules
          git archive --format=zip --output=query-filter.zip HEAD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(env.VERSION, 'v')
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          files: query-filter.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
